<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario jump</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Press+Start+2P&family=Roboto:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-board">
        <div class="hud">
            <div class="hud-item">
                <span class="score-label">Score</span>
                <span class="score-value">0</span>
            </div>
            <div class="hud-item">
                <span class="score-label">Record</span>
                <span class="record-value">0</span>
            </div>
        </div>

        <section class="ranking-panel">
            <div class="ranking-header">
                <h2>Ranking Global</h2>
                <span class="ranking-status">Conectando...</span>
            </div>
            <div class="ranking-table-wrap">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Jogador</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody class="ranking-body">
                        <tr>
                            <td colspan="3">Carregando ranking...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <img src="assets/pipe.png" class="pipe" alt="mario">
        <img src="assets/mario.gif" class="mario" alt="mario">
        <img src="assets/clouds.png" class="claud" alt="nuvens">

        <div class="start-panel show">
            <h1>Mario Jump</h1>
            <label class="name-field" for="player-name">
                <span>Seu nome no ranking</span>
                <input id="player-name" class="player-name-input" type="text" maxlength="16" placeholder="Digite seu nome" autocomplete="nickname">
            </label>
            <p>Pressione iniciar e depois use qualquer tecla ou toque na tela para pular.</p>
            <p class="start-feedback" aria-live="polite"></p>
            <button class="start-button" type="button">Start Game</button>
        </div>

        <div class="game-over-panel">
            <h1>Game Over</h1>
         <!-- <button class="restart-button" type="button">Ver Ranking Global</button> -->
            <p class="player-result" aria-live="polite"></p>
            <p class="save-feedback">Salvando score no ranking...</p>
            <button class="play-again-button" type="button">Jogar Novamente</button>
        </div>
    </div>

    <audio class="start-music" src="assets/01. World 1 Map - Grass Land.mp3" loop autoplay preload="auto"></audio>
    <audio class="start-sound" src="assets/01. Nintendo Logo.mp3"></audio>
    <audio class="bg-music" src="assets/12. Overworld.mp3" loop></audio>
    <audio class="jump-sound" src="assets/40. Jump.mp3"></audio>
    <audio class="coin-sound" src="assets/super-mario-coin-sound.mp3"></audio>
    <audio class="restart-sound" src="assets/48. 1UP - 1-UP.mp3"></audio>
    <audio class="game-over-sound" src="assets/56. Too Bad!.mp3"></audio>
    <footer>by Gabriel Carvalho</footer>
    <script type="module" src="script.js"></script>
</body>
</html>
